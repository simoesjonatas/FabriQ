{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="auth-brand mt-4 mb-4">
            <span class="brand-mark" aria-hidden="true">FQ</span>
            <div>
                <h1>FabriQ</h1>
                <p>Ambiente Corpo &amp; Cheiro</p>
            </div>
        </div>
        <div class="card shadow-sm auth-card">
            <div class="card-body p-4">
                {% block auth_content %}{% endblock %}
            </div>
        </div>
        <div class="auth-signature">
            <img src="{% static 'image/simoeslogo2.png' %}" alt="Simões Tecnologia">
        </div>
        {% block auth_rodape %}{% endblock %}
    </div>
</div>
{% endblock %}
