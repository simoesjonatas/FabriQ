{% extends "base.html" %}

{% block title %}Cadastros{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-xl-10">
        <h1 class="h4 mb-1"><i class="bi bi-folder2-open text-primary me-2"></i>Cadastros gerais</h1>
        <p class="text-body-secondary mb-4">
            Dados básicos usados por pedidos, estoque, qualidade e produção.
        </p>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
            {% for cadastro in cadastros %}
                <div class="col">
                    <a href="{% url cadastro.url_name %}" class="card h-100 shadow-sm text-decoration-none card-modulo">
                        <div class="card-body">
                            <h2 class="h6 mb-1">
                                <i class="bi {{ cadastro.icone }} text-primary me-2"></i>{{ cadastro.titulo }}
                            </h2>
                            <p class="small text-body-secondary mb-0">{{ cadastro.descricao }}</p>
                        </div>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
