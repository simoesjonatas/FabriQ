services:
  db:
    image: postgres:16
    container_name: fabriq_db
    restart: unless-stopped
    env_file:
      - ${FABRIQ_ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabriq_web
    restart: unless-stopped
    env_file:
      - ${FABRIQ_ENV_FILE:-.env.production}
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "${GUNICORN_WORKERS:-3}"
      - --timeout
      - "${GUNICORN_TIMEOUT:-60}"
      - --no-control-socket
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    networks:
      - internal
      - proxy
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${FABRIQ_WEB_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 5); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  media_data:
  logs_data:

networks:
  internal:
  proxy:
    name: fabriq_proxy
