services:
  db:
    image: postgres:16
    container_name: fabriq_db
    restart: unless-stopped
    env_file:
      - ${FABRIQ_ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabriq_web
    restart: unless-stopped
    env_file:
      - ${FABRIQ_ENV_FILE:-.env.production}
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "${GUNICORN_WORKERS:-3}"
      - --timeout
      - "${GUNICORN_TIMEOUT:-60}"
      - --no-control-socket
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Porta publicada no host para o Nginx Proxy Manager encaminhar.
      # 8190 escolhida 
      - "${FABRIQ_WEB_PORT:-8190}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os, http.client;
          host=(os.getenv('FABRIQ_DOMAIN') or next((h.strip() for h in (os.getenv('DJANGO_ALLOWED_HOSTS') or '').split(',') if h.strip() and h.strip() != '*'), 'localhost'));
          conn=http.client.HTTPConnection('127.0.0.1', 8000, timeout=5);
          conn.request('GET', '/healthz/', headers={'Host': host, 'Connection': 'close'});
          resp=conn.getresponse();
          raise SystemExit(0 if resp.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  media_data:
  logs_data:

networks:
  internal:
